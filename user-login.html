<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login - Eagle Eye Ticketing</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="user-login.css">
</head>
<body>

    <div class="bg-image">
        <div class="login-card">
            
            <div class="text-center mb-4">
                <div class="brand-text">EAGLE EYE & AQUILA VISION</div>
                <div class="system-text">TICKETING SYSTEM</div>
            </div>

            <p class="mb-4" style="color: #222;">Login to your account.</p>

            <form onsubmit="event.preventDefault(); window.location.href='user-dashboard.html';">
                
                <div class="mb-3">
                    <label for="userEmail" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="userEmail" required>
                </div>

                <div class="mb-1">
                    <label for="userPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="userPassword" required>
                </div>

                <div class="error-text mb-3 d-none" id="loginError">
                    <i class="bi bi-x text-danger" style="font-size: 1.2rem;"></i> Incorrect email or password
                </div>

                <div class="d-flex justify-content-between align-items-center mb-5 mt-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="showPasswordCheckbox" onclick="toggleUserPassword()">
                        <label class="form-check-label" for="showPasswordCheckbox">
                            Show Password
                        </label>
                    </div>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-login">Login</button>
                </div>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Toggles password visibility based on the checkbox
        function toggleUserPassword() {
            const pwdInput = document.getElementById('userPassword');
            const checkbox = document.getElementById('showPasswordCheckbox');
            pwdInput.type = checkbox.checked ? 'text' : 'password';
        }
    </script>
</body>
</html>
