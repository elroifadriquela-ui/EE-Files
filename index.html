<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Eye Ticketing System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container min-vh-100 d-flex justify-content-center align-items-center py-5">
        
        <div class="main-container-card" id="mainCard">

            <div class="image-panel">
                <img src="img/bg3.png" alt="Eagle Eye Logo" style="width: 100%; height: 100%; object-fit: cover; object-position: center;">
            </div>

            <div class="form-panel register-panel">
                <div class="form-container">
                    <h2 class="page-title text-center">Create Account</h2>
                    <p class="text-center text-muted mb-4 fst-italic" style="font-size: 0.9rem;">Eagle Eye Business & Collection Service INC.</p>

                    <form id="registerForm" onsubmit="event.preventDefault(); alert('Account successfully created! Please login.'); toggleSlider();">
                        <div class="mb-3">
                            <label for="regUsername" class="form-label text-muted small fw-bold mb-1">Username</label>
                            <input type="text" class="form-control" id="regUsername" required>
                        </div>

                        <div class="mb-3">
                            <label for="regEmail" class="form-label text-muted small fw-bold mb-1">Email Address</label>
                            <input type="email" class="form-control" id="regEmail" required>
                        </div>

                        <div class="mb-3">
                            <label for="regPassword" class="form-label text-muted small fw-bold mb-1">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="regPassword" required>
                                <span class="input-group-text bg-white" style="cursor: pointer;" onclick="toggleIconPassword('regPassword', 'regEyeIcon')">
                                    <i class="bi bi-eye-slash text-muted" id="regEyeIcon"></i>
                                </span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="regConfirmPassword" class="form-label text-muted small fw-bold mb-1">Confirm Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="regConfirmPassword" required>
                                <span class="input-group-text bg-white" style="cursor: pointer;" onclick="toggleIconPassword('regConfirmPassword', 'regConfirmEyeIcon')">
                                    <i class="bi bi-eye-slash text-muted" id="regConfirmEyeIcon"></i>
                                </span>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-brand mb-3">Register</button>

                        <div class="text-center" style="font-size: 0.9rem;">
                            Already have an account? <a href="#" class="brand-link fw-bold" onclick="toggleSlider()">Login here</a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="form-panel login-panel">
                <div class="form-container">
                    <h2 class="page-title text-center">TICKETING SYSTEM</h2>
                    <p class="text-center text-muted mb-4">Login to your account.</p>

                    <form id="loginForm" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                        <div class="mb-3">
                            <label for="loginEmail" class="form-label text-muted small fw-bold mb-1">Email Address</label>
                            <input type="email" class="form-control" id="loginEmail" required>
                        </div>

                        <div class="mb-2">
                            <label for="loginPassword" class="form-label text-muted small fw-bold mb-1">Password</label>
                            <input type="password" class="form-control" id="loginPassword" required>
                            <div class="error-message mt-1" id="loginError">
                                <i class="bi bi-x-lg"></i>Incorrect email or password
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4 mt-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="showPasswordCheckbox" onclick="toggleLoginPassword()">
                                <label class="form-check-label text-muted" for="showPasswordCheckbox" style="font-size: 0.9rem;">
                                    Show Password
                                </label>
                            </div>
                            <a href="#" class="text-dark text-decoration-underline" style="font-size: 0.9rem;">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-brand mb-3">Login</button>

                        <div class="text-center" style="font-size: 0.9rem;">
                            Need an account? <a href="#" class="brand-link fw-bold" onclick="toggleSlider()">Register Here</a>
                        </div>
                    </form>
                </div>
            </div>

        </div> 
    </div> 
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Toggles the slide animation from your CSS
        function toggleSlider() {
            document.getElementById('mainCard').classList.toggle('slide-active');
        }

        // Toggles password visibility on Login
        function toggleLoginPassword() {
            const pwdInput = document.getElementById('loginPassword');
            const checkbox = document.getElementById('showPasswordCheckbox');
            pwdInput.type = checkbox.checked ? 'text' : 'password';
        }

        // Toggles password visibility on Register (eye icons)
        function toggleIconPassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("bi-eye-slash");
                icon.classList.add("bi-eye");
                icon.classList.add("text-primary");
            } else {
                input.type = "password";
                icon.classList.remove("bi-eye");
                icon.classList.remove("text-primary");
                icon.classList.add("bi-eye-slash");
            }
        }
    </script>
</body>
</html>
